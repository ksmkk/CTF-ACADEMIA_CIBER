<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nivel 4</title>
  <link rel="stylesheet" href="/public/styles.css">
</head>
<body>
  <main class="container">
    <h1>Nivel 4: Nada llega completo</h1>

    <div class="box">
      <p>Fragmento 1: <span class="flag">ACADEMIA{une_</span></p>
      <p class="clue">Pista visible: el resto esta en un recurso del mismo nivel.</p>
      <p class="mini-tip">Mini ayuda: busca carpetas como /recursos/ dentro de este nivel.</p>
    </div>

    <div class="box">
      <h2>Validar flag y desbloquear</h2>
      <p>Une los fragmentos y valida para abrir el nivel 5.</p>
      <form class="unlock" method="POST" action="/validar">
        <input type="hidden" name="nivel" value="4">
        <label for="flag4">Flag del nivel 4</label>
        <input id="flag4" name="flag" autocomplete="off" placeholder="ACADEMIA{...}" required>
        <button type="submit">Desbloquear nivel 5</button>
      </form>
    </div>

    <p><a href="/">Volver al inicio</a></p>
  </main>

  <!-- Ayuda extra: revisa /nivel4/recursos/fragmento.txt -->
</body>
</html>
